name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: build:mac
            artifact_name: unitmux-macos
            artifact_path: release-assets/unitmux-macos.dmg
          - os: ubuntu-latest
            build_cmd: build:linux
            artifact_name: unitmux-linux
            artifact_path: release-assets/unitmux-linux
          - os: windows-latest
            build_cmd: build:win
            artifact_name: unitmux-windows
            artifact_path: release-assets/unitmux-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Static checks
        run: |
          npm run lint
          npm test
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: npm run ${{ matrix.build_cmd }}
        env:
          REQUIRE_DMG: ${{ runner.os == 'macOS' && '1' || '' }}

      - name: Validate macOS app bundle
        if: runner.os == 'macOS'
        run: |
          plutil -lint target/release/bundle/macos/unitmux.app/Contents/Info.plist
          file target/release/bundle/macos/unitmux.app/Contents/Resources/unitmux.icns
          codesign --verify --deep --strict --verbose=2 target/release/bundle/macos/unitmux.app

      - name: Validate Linux binary
        if: runner.os == 'Linux'
        run: |
          test -x target/x86_64-unknown-linux-gnu/release/unitmux
          file target/x86_64-unknown-linux-gnu/release/unitmux

      - name: Validate Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path target/x86_64-pc-windows-msvc/release/unitmux.exe)) {
            throw 'Windows binary is missing'
          }
          Get-Item target/x86_64-pc-windows-msvc/release/unitmux.exe | ForEach-Object {
            if ($_.Length -le 0) {
              throw 'Windows binary is empty'
            }
          }

      - name: Prepare release asset
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-assets
          test -f target/release/bundle/macos/unitmux.dmg
          cp target/release/bundle/macos/unitmux.dmg release-assets/unitmux-macos.dmg

      - name: Prepare release asset
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-assets
          cp target/x86_64-unknown-linux-gnu/release/unitmux release-assets/unitmux-linux
          chmod 755 release-assets/unitmux-linux

      - name: Prepare release asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/unitmux.exe release-assets/unitmux-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/unitmux-*
